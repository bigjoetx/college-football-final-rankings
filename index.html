<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>College Football · Final Season Rankings 1936–2025</title>
<style>
  :root{
    --bg:#080808; --card:#111; --border:#1e1e1e;
    --team:#CC2222; --silver:#AAA; --bcs:#B87333; --gold:#C9A227;
    --t1:#EEE; --t2:#888; --t3:#444;
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--bg); color:var(--t1);
    font-family:Georgia,'Times New Roman',serif;
    padding:24px 20px;
  }
  .wrap{max-width:1180px;margin:0 auto}

  header{text-align:center;margin-bottom:22px}
  .eyebrow{font-size:9px;letter-spacing:5px;color:var(--t3);text-transform:uppercase;margin-bottom:6px}
  h1{font-size:26px;margin:0 0 6px;color:#fff;letter-spacing:-.5px}
  .sub{font-size:12px;color:var(--t2);margin:0}

  /* team picker */
  .picker{display:flex;align-items:center;justify-content:center;gap:12px;
    margin:0 auto 22px;max-width:680px;flex-wrap:wrap}
  .picker img{width:34px;height:34px;object-fit:contain}
  select{
    background:var(--card);color:var(--t1);border:1px solid var(--border);
    border-radius:6px;padding:8px 12px;font-family:inherit;font-size:14px;
    min-width:260px;cursor:pointer;
  }
  select:focus-visible,button:focus-visible{outline:2px solid var(--team);outline-offset:2px}

  .stats{display:flex;background:var(--card);border:1px solid var(--border);
    border-radius:10px;overflow:hidden;max-width:680px;margin:0 auto 28px}
  .stat{flex:1;text-align:center;padding:16px 8px;border-right:1px solid var(--border)}
  .stat:last-child{border-right:none}
  .stat b{display:block;color:var(--team);font-size:22px;line-height:1}
  .stat span{display:block;color:var(--t3);font-size:9px;text-transform:uppercase;letter-spacing:.8px;margin-top:4px}

  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 16px;margin-bottom:20px}
  .hint{font-size:10px;color:var(--t3);text-align:right;margin-bottom:6px}
  .scroll{overflow-x:auto}
  svg{display:block}
  .yearGroup:hover .bar{filter:brightness(1.35)}
  .bar{transition:opacity .12s}

  #tip{
    position:fixed;pointer-events:none;opacity:0;transition:opacity .1s;
    background:#160808;border:1px solid #550000;border-radius:8px;
    padding:12px 16px;min-width:210px;box-shadow:0 4px 20px rgba(0,0,0,.6);
    font-family:Georgia,serif;z-index:50;
  }
  #tip .ty{color:var(--team);font-weight:bold;font-size:16px;letter-spacing:1px}
  #tip .tr{color:var(--t3);font-size:11px;margin-bottom:10px}
  #tip .tl{font-size:13px;margin-bottom:3px;color:var(--t2)}
  #tip .tn{margin-top:8px;font-size:11px;color:var(--gold);
    border-top:1px solid #2a2a2a;padding-top:6px;line-height:1.5;max-width:260px}

  .keys{display:flex;justify-content:center;gap:22px;margin-top:12px;font-size:11px;flex-wrap:wrap}
  .key{display:flex;align-items:center;gap:6px;color:var(--t2)}
  .key i{font-style:normal;color:var(--t3);font-size:10px}
  .sw{width:11px;height:11px;border-radius:2px;flex:none}
  .eras{display:flex;justify-content:center;gap:20px;margin-top:8px;font-size:10px;flex-wrap:wrap}
  .eras span{display:flex;align-items:center;gap:5px;color:var(--t2)}
  .eras .sw{width:9px;height:9px}

  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px;margin-bottom:20px}
  .era{border:1px solid var(--border);border-radius:10px;padding:14px 16px}
  .era h3{font-size:13px;margin:0 0 2px;color:var(--t1)}
  .era .yr{font-size:10px;color:var(--gold);letter-spacing:1px;margin-bottom:10px}
  .era p{font-size:11px;color:var(--t2);margin:0 0 5px;padding-left:8px;
    border-left:2px solid var(--border);line-height:1.4}

  .tabs{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .tabs .lbl{font-size:12px;color:var(--t2);text-transform:uppercase;letter-spacing:2px;margin-right:4px}
  button{background:transparent;color:var(--t3);border:1px solid var(--border);
    border-radius:4px;padding:3px 10px;font-size:10px;cursor:pointer;
    letter-spacing:.5px;font-family:inherit}
  button.on{background:var(--team);color:#fff;border-color:var(--team)}

  table{width:100%;border-collapse:collapse;font-size:12px;min-width:620px}
  th{padding:5px 10px;text-align:left;color:var(--t3);font-weight:normal;
    font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
    border-bottom:2px solid var(--border)}
  td{padding:7px 10px;border-bottom:1px solid #181818}
  tr:nth-child(even){background:rgba(255,255,255,.015)}
  .cY{color:var(--team);font-weight:bold;font-size:13px}
  .cA{color:var(--team)}.cC{color:var(--silver)}.cB{color:var(--bcs)}.cP{color:var(--gold)}
  .cF{color:var(--t3);font-size:11px}
  .note{margin:14px 0 0;font-size:10px;color:#333;line-height:1.8}

  .empty{text-align:center;padding:46px 20px;color:var(--t2)}
  .empty b{display:block;color:var(--t1);font-size:15px;margin-bottom:8px}
  .empty p{font-size:12px;margin:0 auto;max-width:420px;line-height:1.6}
  [hidden]{display:none!important}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>

    </div>
    <p class="note" id="footnote"></p>
  </div>
</div>

/* Coverage of each source, straight from the pull. Shown in the legend so an
   empty stretch never gets misread as "unranked". */
const COVERAGE = {
  ap:      [1936, 2025],
  coaches: [1950, 2025],   // Coaches Poll began in 1950. It did not exist before.
  bcs:     [1998, 2013],   // complete: the BCS's entire life
  cfp:     [2014, 2025]
};

/* How deep each poll ranked, by era. Without this the axis lies: AP ranked only
   10 teams from 1962-67, so a #10 that year was the last team ranked, while a
   #10 in 2025 is a good season. Both draw the same bar on a fixed 1-25 axis. */
const DEPTH = DATA.meta.pollDepth;
function depthAt(series, year){
  for (const [a, b, n] of (DEPTH[series] || []))
    if (year >= a && year <= b) return n;
  return null;
}

/* Where each source's numbers came from. Provenance is uniform per era. */
const PROVENANCE = DATA.meta.coachesProvenance || {};
function coachesSource(year){
  if (year < 1950) return null;
  if (year <= 1976) return "newspaper archive (Carter)";
  if (year <= 2000) return "Wikipedia";
  return "CollegeFootballData";
}

/* Background tints for era bands. Majors get a deliberate hue; everything else
   (and there is a lot of else — Border, Skyline, Missouri Valley…) is derived
   from the name so all 138 teams work without a hand-built table. */
const CONF_TINT = {
  "SEC":"#003310", "Big Ten":"#1a1a44", "Big 12":"#2a1444", "ACC":"#0d2a44",
  "Pac-12":"#3a2410", "Pac-10":"#3a2410", "Pacific Coast":"#3a2410",
  "Southwest":"#500000", "Big 8":"#33230a", "Big Eight":"#33230a",
  "FBS Independents":"#242424", "American Athletic":"#0a2f3a",
  "Mountain West":"#2a2010", "Sun Belt":"#33280a", "Conference USA":"#241a33",
  "Mid-American":"#0a2622", "Big East":"#330a1a", "Southern":"#1a2a0a",
  "Western Athletic":"#2b1a0a", "Missouri Valley":"#1a1a2a"
};
function tintFor(conf){
  if (CONF_TINT[conf]) return CONF_TINT[conf];
  let h = 0;
  for (const ch of conf) h = (h * 31 + ch.charCodeAt(0)) % 360;
  return `hsl(${h} 42% 13%)`;
}

const NS = "http://www.w3.org/2000/svg";
const el = (n, a = {}) => {
  const e = document.createElementNS(NS, n);
  for (const k in a) e.setAttribute(k, a[k]);
  return e;
};
const $ = id => document.getElementById(id);
const esc = s => String(s).replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));

/* rows are [year, ap, coaches, bcs, cfp, record, conference] */
const F = { year:0, ap:1, coaches:2, bcs:3, cfp:4, record:5, conf:6 };

const teams = DATA.teams;
const byName = Object.fromEntries(teams.map(t => [t.school, t]));
let current = byName["Texas A&M"] || teams.find(t => t.seasons.length);
let filter = "all";

/* ── team picker, grouped by conference ── */
(function buildPicker(){
  const sel = $("teamSel");
  const groups = {};
  for (const t of teams) (groups[t.conference] ||= []).push(t);
  for (const conf of Object.keys(groups).sort()){
    const og = document.createElement("optgroup");
    og.label = conf;
    for (const t of groups[conf].sort((a,b) => a.school.localeCompare(b.school))){
      const o = document.createElement("option");
      o.value = t.school;
      o.textContent = t.school + (t.seasons.length ? "" : " —");
      og.appendChild(o);
    }
    sel.appendChild(og);
  }
  sel.value = current.school;
  sel.addEventListener("change", () => {
    current = byName[sel.value];
    filter = "all";
    render();
  });
})();

/* ── derive conference eras from the ranked seasons ── */
function erasFor(team){
  const s = team.seasons;
  if (!s.length) return [];
  const runs = [];
  for (const row of s){
    const conf = row[F.conf] || "—";
    const last = runs[runs.length - 1];
    if (last && last.conf === conf) last.end = row[F.year];
    else runs.push({ conf, start: row[F.year], end: row[F.year], rows: [] });
  }
  for (const row of s){
    const r = runs.find(r => row[F.year] >= r.start && row[F.year] <= r.end
                             && r.conf === (row[F.conf] || "—"));
    if (r) r.rows.push(row);
  }
  /* Stretch bands to fill the axis. Boundaries land on the first ranked season
     of the next conference, which can sit a year or two off the real move. */
  runs[0].bandStart = Y0;
  runs[runs.length - 1].bandEnd = Y1;
  for (let i = 0; i < runs.length - 1; i++){
    runs[i].bandEnd = runs[i + 1].start - 1;
    runs[i + 1].bandStart = runs[i + 1].start;
  }
  return runs;
}

/* ── chart ── */
function drawChart(team, eras){
  const svg = $("chart");
  svg.textContent = "";
  const W = 1140, H = 430, M = { t:18, r:20, b:34, l:44 };
  const PW = W - M.l - M.r, PH = H - M.t - M.b;
  const slot = PW / NY;
  const bw = Math.max(2.6, slot / 3 - 0.5);
  const xFor = y => M.l + (y - Y0) * slot;
  const hFor = r => ((26 - r) / 25) * PH;
  const yFor = r => M.t + PH - hFor(r);

  svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
  svg.setAttribute("width", W);
  svg.setAttribute("height", H);
  svg.setAttribute("role", "img");
  svg.setAttribute("aria-label",
    `${team.school} final rankings by season, ${Y0} to ${Y1}`);

  for (const e of eras){
    svg.appendChild(el("rect", {
      x: xFor(e.bandStart), y: M.t,
      width: (e.bandEnd - e.bandStart + 1) * slot, height: PH,
      fill: tintFor(e.conf), "fill-opacity": .75
    }));
  }

  [1, 6, 11, 16, 21, 25].forEach(r => {
    const y = yFor(r);
    svg.appendChild(el("line", { x1:M.l, x2:W - M.r, y1:y, y2:y,
      stroke:"#1a1a1a", "stroke-dasharray":"3 3" }));
    const t = el("text", { x:M.l - 8, y:y + 3.5, fill:"#444",
      "font-size":10, "text-anchor":"end" });
    t.textContent = "#" + r;
    svg.appendChild(t);
  });

  svg.appendChild(el("line", { x1:M.l, x2:W - M.r, y1:M.t + PH, y2:M.t + PH, stroke:"#2a2a2a" }));

  /* where each data source begins — the empty space to the left is missing
     data, not a run of unranked seasons */
  [[1950, "#4a4a4a", "Coaches Poll begins"], [2014, "#665500", "CFP"]].forEach(([y, c, lab]) => {
    const x = xFor(y);
    svg.appendChild(el("line", { x1:x, x2:x, y1:M.t, y2:M.t + PH,
      stroke:c, "stroke-dasharray":"2 5" }));
    const t = el("text", { x:x + 3, y:M.t + 10, fill:c, "font-size":9 });
    t.textContent = lab;
    svg.appendChild(t);
  });

  [1936, 1950, 1960, 1970, 1980, 1990, 2000, 2010, 2020, 2025].forEach(y => {
    const t = el("text", { x:xFor(y) + slot / 2, y:H - 14, fill:"#444",
      "font-size":10, "text-anchor":"middle" });
    t.textContent = y;
    svg.appendChild(t);
  });

  /* Shade below where the AP poll stopped ranking. In 1962-67 only 10 teams
     were ranked, so the region under #10 is "no such thing as ranked here",
     not "unranked". Drawing it stops the axis implying otherwise. */
  {
    let d = "";
    for (let y = Y0; y <= Y1; y++){
      const n = depthAt("ap", y);
      if (n == null) continue;
      const yTop = yFor(n);
      d += `M${xFor(y)},${yTop} H${xFor(y) + slot} V${M.t + PH} H${xFor(y)} Z `;
    }
    svg.appendChild(el("path", { d, fill: "#000", "fill-opacity": .34 }));
    for (let y = Y0; y < Y1; y++){
      const a = depthAt("ap", y), b = depthAt("ap", y + 1);
      if (a && b && a !== b){
        const x = xFor(y + 1);
        svg.appendChild(el("line", { x1: x, x2: x, y1: yFor(Math.min(a, b)),
          y2: yFor(Math.max(a, b)), stroke: "#555", "stroke-width": 1 }));
        const t = el("text", { x: x + 2, y: yFor(b) - 3, fill: "#666",
          "font-size": 8 });
        t.textContent = `AP top ${b}`;
        svg.appendChild(t);
      }
    }
  }

  /* BCS and CFP never overlap (2001-13 vs 2014-), so they share slot 3 */
  const series = [
    ["ap", team.display, 0],
    ["coaches", C.silver, 1],
    ["bcs", C.bcs, 2],
    ["cfp", C.gold, 2]
  ];

  for (const row of team.seasons){
    const g = el("g", { class:"yearGroup" });
    const base = xFor(row[F.year]) + (slot - (bw * 3 + 2)) / 2;

    for (const [k, col, i] of series){
      const v = row[F[k]];
      if (v == null) continue;
      g.appendChild(el("rect", { class:"bar", x:base + i * (bw + 1),
        y:yFor(v), width:bw, height:hFor(v), fill:col, rx:1 }));
    }

    /* A star means a poll named them national champion. AP and Coaches
       disagreed 11 times, so some seasons put a star on two different teams —
       that is the history, not a glitch. One star per team-season: at ~12px per
       year the AP and Coaches bars sit ~4px apart and two glyphs would collide.
       The tooltip says which poll, or both. */
    if (row[F.ap] === 1 || row[F.coaches] === 1){
      const t = el("text", { x:base + bw + 0.5, y:yFor(1) - 6, fill:"#FFD700",
        "font-size":13, "text-anchor":"middle" });
      t.textContent = "★";
      g.appendChild(t);
    }

    g.appendChild(el("rect", { x:xFor(row[F.year]) - 1, y:M.t,
      width:slot + 2, height:PH, fill:"transparent" }));
    g.addEventListener("mousemove", e => showTip(e, row, team));
    g.addEventListener("mouseleave", hideTip);
    svg.appendChild(g);
  }
}

/* ── tooltip ── */
const tip = $("tip");
/*
  What the Coaches Poll #1 means depends on the era.

  From 1998 the coaches were contractually bound to rank the BCS title-game
  winner #1, and from 2014 the CFP champion. So Coaches #1 IS the BCS/CFP
  champion — LSU 2003, Florida 2008, Alabama 2011, Ohio State 2014 and 2024.

  Note we deliberately do NOT use the bcs/cfp columns for this. Those are the
  final STANDINGS, published before the title game to decide who plays in it.
  They are seedings, not results: CFP #1 in 2024 was Oregon, who lost in the
  quarterfinal, while Ohio State won it from #6. BCS #1 in 2011 was LSU, who
  lost the game to Alabama. Crowning the #1 seed would put the wrong team on
  the chart in most years.
*/
function championLabel(year){
  if (year >= 2014) return "CFP";
  if (year >= 1998) return "BCS";
  if (year >= 1950) return "Coaches Poll";
  return null;
}

function titleFor(row){
  const y = row[F.year];
  const a = row[F.ap] === 1, c = row[F.coaches] === 1;
  const lab = championLabel(y);
  if (a && c) return `★ Consensus national champion (AP + ${lab})`;
  if (a) return "★ AP national champion";
  if (c) return `★ ${lab} national champion`;
  return null;
}

function showTip(e, row, team){
  const note = NOTES[team.school + "|" + row[F.year]];
  const title = titleFor(row);
  const line = (lab, v, col) => v == null ? "" :
    `<div class="tl">${lab}: <b style="color:${col}">#${v}</b></div>`;
  tip.innerHTML =
    `<div class="ty">${row[F.year]} ${esc(team.school).toUpperCase()}</div>` +
    `<div class="tr">${esc(row[F.record] || "—")} · ${esc(row[F.conf] || "—")}</div>` +
    (title ? `<div style="color:#FFD700;font-size:12px;margin-bottom:8px">${title}</div>` : "") +
    line("AP Poll", row[F.ap], team.display) +
    line("Coaches Poll", row[F.coaches], C.silver) +
    line("BCS Standings", row[F.bcs], C.bcs) +
    line("CFP Committee", row[F.cfp], C.gold) +
    (row[F.coaches] != null && row[F.year] < 1974
      ? `<div class="tn">The final Coaches Poll was taken before the bowl games
         until 1974, so it can disagree with the AP's post-bowl finish. Both are
         correct.</div>` : "") +
    (note ? `<div class="tn">${esc(note)}</div>` : "");
  tip.style.opacity = 1;
  const pad = 16;
  let x = e.clientX + pad, y = e.clientY + pad;
  const r = tip.getBoundingClientRect();
  if (x + r.width > innerWidth - 8) x = e.clientX - r.width - pad;
  if (y + r.height > innerHeight - 8) y = e.clientY - r.height - pad;
  tip.style.left = x + "px";
  tip.style.top = y + "px";
}
function hideTip(){ tip.style.opacity = 0; }

/* ── stats ── */
function drawStats(team){
  const s = team.seasons;
  const aps = s.filter(r => r[F.ap] != null);
  const best = aps.reduce((a, r) => !a || r[F.ap] < a[F.ap] ? r : a, null);
  const apTitles = aps.filter(r => r[F.ap] === 1).length;
  const coTitles = s.filter(r => r[F.coaches] === 1).length;
  const titles = s.filter(r => r[F.ap] === 1 || r[F.coaches] === 1).length;
  const last = s.length ? s[s.length - 1][F.year] : null;

  const cells = [
    [best ? "#" + best[F.ap] : "—", best ? `Best AP · ${best[F.year]}` : "Best AP"],
    [aps.length, "Final AP appearances"],
    [titles || "—", titles && apTitles !== coTitles
      ? `Poll titles · ${apTitles} AP / ${coTitles} coaches`
      : "Poll national titles"],
    [last ?? "—", "Last ranked"]
  ];
  $("stats").innerHTML = cells
    .map(([b, l]) => `<div class="stat"><b>${b}</b><span>${esc(l)}</span></div>`)
    .join("");
}

/* ── legend ── */
function drawKeys(team, eras){
  const keys = [
    ["AP Poll", team.display, COVERAGE.ap],
    ["Coaches Poll", C.silver, COVERAGE.coaches],
    ["BCS Standings", C.bcs, COVERAGE.bcs],
    ["CFP Committee", C.gold, COVERAGE.cfp]
  ];
  $("keys").innerHTML = keys.map(([lab, col, [a, b]]) =>
    `<span class="key"><span class="sw" style="background:${col}"></span>${lab} <i>${a}–${b}</i></span>`
  ).join("");

  $("keys").innerHTML += `<span class="key"><span style="color:#FFD700">★</span>`
    + ` National champion <i>AP or Coaches</i></span>`;

  $("eraKeys").innerHTML = eras.map(e =>
    `<span><span class="sw" style="background:${tintFor(e.conf)}"></span>${esc(e.conf)} · ${e.bandStart === Y0 ? "–" : e.bandStart}${e.bandStart === Y0 ? e.bandEnd : "–" + (e.bandEnd === Y1 ? "" : e.bandEnd)}</span>`
  ).join("");
}

/* ── era cards ── */
function drawEraCards(eras, team){
  $("eraCards").innerHTML = eras.map(e => {
    const aps = e.rows.filter(r => r[F.ap] != null).map(r => r[F.ap]);
    const best = aps.length ? Math.min(...aps) : null;
    const items = [
      `${e.rows.length} ranked season${e.rows.length === 1 ? "" : "s"}`,
      best ? `Best finish: AP #${best}` : "No AP top-25 finish",
      `${e.start}–${e.end}`
    ];
    const noted = e.rows
      .map(r => NOTES[team.school + "|" + r[F.year]])
      .filter(Boolean).slice(0, 2);
    return `<div class="era" style="background:${tintFor(e.conf)}">
      <h3>${esc(e.conf)}</h3>
      <div class="yr">${e.bandStart === Y0 ? "–" + e.bandEnd : e.bandStart + "–" + (e.bandEnd === Y1 ? "present" : e.bandEnd)}</div>
      ${items.concat(noted).map(i => `<p>${esc(i)}</p>`).join("")}
    </div>`;
  }).join("");
}

/* ── table ── */
function drawTable(team, eras){
  const confs = [...new Set(team.seasons.map(r => r[F.conf] || "—"))];
  const tabs = $("tabs");
  tabs.innerHTML = `<span class="lbl">All Ranked Seasons</span>`;
  for (const f of ["all", ...confs]){
    const b = document.createElement("button");
    b.textContent = f === "all" ? "All Eras" : f;
    b.className = filter === f ? "on" : "";
    b.addEventListener("click", () => { filter = f; drawTable(team, eras); });
    tabs.appendChild(b);
  }

  const rows = [...team.seasons].reverse()
    .filter(r => filter === "all" || (r[F.conf] || "—") === filter);
  const cell = (v, cls, dash) => `<td class="${cls}">${v != null ? "#" + v : dash}</td>`;

  $("tbody").innerHTML = rows.map(r => `<tr>
    <td class="cY">${r[F.year]}${(r[F.ap] === 1 || r[F.coaches] === 1)
        ? ' <span style="color:#FFD700">★</span>' : ""}</td>
    <td>${esc(r[F.record] || "—")}</td>
    <td style="color:#444">${esc(r[F.conf] || "—")}</td>
    ${cell(r[F.ap], "cA", "—")}
    ${cell(r[F.coaches], "cC", r[F.year] < 2001 ? "n/a" : "—")}
    ${cell(r[F.bcs], "cB", (r[F.year] >= 2001 && r[F.year] <= 2013) ? "—" : "n/a")}
    ${cell(r[F.cfp], "cP", r[F.year] >= 2014 ? "—" : "n/a")}
    <td class="cF">${esc(NOTES[team.school + "|" + r[F.year]] || "")}</td>
  </tr>`).join("");
}

/* ── render ── */
function render(){
  const team = current;
  document.documentElement.style.setProperty("--team", team.display);
  $("title").textContent = team.school;
  $("subtitle").textContent =
    `${team.conference} · ${team.seasons.length} ranked season${team.seasons.length === 1 ? "" : "s"} · 1936–2025`;

  const logo = $("logo");
  if (team.logo){ logo.src = team.logo; logo.alt = ""; logo.hidden = false; }
  else logo.hidden = true;

  const has = team.seasons.length > 0;
  $("chartCard").hidden = !has;
  $("tableCard").hidden = !has;
  $("stats").hidden = !has;
  $("eraCards").hidden = !has;
  $("emptyState").hidden = has;

  if (!has){
    $("emptyMsg").textContent =
      `${team.school} has no AP, Coaches, BCS, or CFP top-25 finish on record between 1936 and 2025. Pick another team above.`;
    return;
  }

  const eras = erasFor(team);
  drawStats(team);
  drawChart(team, eras);
  drawKeys(team, eras);
  drawEraCards(eras, team);
  drawTable(team, eras);

  $("footnote").innerHTML = `
    <b style="color:#555">Sources.</b>
    AP Poll 1936–2025 and CFP from
    <a href="https://collegefootballdata.com" style="color:#666">CollegeFootballData.com</a>.
    Coaches Poll 1950–1976 assembled from newspaper archives by Carter Claiborne,
    <a href="https://cwclaib.github.io/football/polls/" style="color:#666">cwclaib.github.io</a>;
    1977–2000 and BCS 1998–2013 from
    <a href="https://en.wikipedia.org/wiki/Coaches_Poll" style="color:#666">Wikipedia</a>;
    2001–2025 from CollegeFootballData.
    The Coaches Poll did not exist before 1950; blank is not unranked.
    BCS standings 1998–2013 from Wikipedia, complete. (CollegeFootballData's BCS
    data held only 2007–2013 and served pre-final November weeks as finals, so it
    is not used.)
    <br>
    <b style="color:#555">Reading the chart.</b>
    A ★ marks a season a poll named the team national champion, and the tooltip
    says which. From 1998 the Coaches Poll was contractually bound to rank the
    BCS title-game winner first, and from 2014 the CFP champion — so a coaches
    ★ in those eras <em>is</em> the BCS or CFP championship. The AP and Coaches
    polls picked different champions eleven times — 1954, 1957, 1965, 1970,
    1973, 1974, 1978, 1990, 1991, 1997 and 2003 — so in those years a star
    appears on two different teams. Both are real.
    The BCS and CFP <em>bars</em> are the final standings, which were published
    before the title game to decide who played in it. They are seedings, not
    results: the 2024 CFP ranked Oregon first and Ohio State won the title from
    sixth; the 2003 BCS ranked Oklahoma first and LSU won the game while USC took
    the AP title without playing in it. Champions come from the polls, never from
    the seeding. The BCS ranked 15 teams from 1998–2002 and 25 from 2003.
    The shaded floor marks how deep the AP poll went that year — it ranked only
    10 teams from 1962–67, so a #10 then was the last team ranked, not a good
    season. Until 1974 the final Coaches Poll was taken <em>before</em> the bowls
    while the AP's was taken after, which is how the same season produces two
    different champions — Texas was Coaches #1 and AP #3 in 1970, and both are
    right. Final AP polls before 1968 were also pre-bowl, so a team's listed
    record may include a bowl its ranking never saw.
    For 1982–1990 the Coaches Poll shown is UPI; a separate USA&nbsp;Today/CNN
    poll ran alongside it and disagreed — in 1990 UPI chose Georgia Tech while
    USA&nbsp;Today/CNN chose Colorado.
    <br>
    <b style="color:#555">Scope.</b>
    2026 FBS members only. Teams that were ranked but have since left FBS — the
    Ivies, Santa Clara, and the WWII service teams like Iowa Pre-Flight and
    Randolph Field — are not shown. Conference bands come from each season's
    actual conference. A few early rows have no record on file.
  `;
}

render();
</script>
</body>
</html>
